<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — LibraryHub</title>
    <meta name="description" content="Create an account to access LibraryHub.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-wrapper" style="flex-direction: row-reverse;">
        <!-- Visual Side -->
        <div class="auth-visual">
            <img src="https://images.unsplash.com/photo-1507738978512-35798112892c?w=1200&h=1600&fit=crop" alt="Library">
            <div class="auth-overlay-text">
                <h2>Join the<br>Community</h2>
                <p>Register today to get access to thousands of books, track your reading history, and more.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="brand">
                <div class="brand-icon">📖</div>
                <div class="brand-text">LibraryHub</div>
            </div>

            <h1>Create Account</h1>
            <p class="auth-subtitle">Fill in the details below to get started</p>

            <div id="alert" class="auth-alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="registerBtn" style="justify-content:center;">
                    Create Account
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        if (window.location.port === '5500') {
            window.location.replace('http://localhost:8080/register.html');
        }

        const API = window.location.port === '5500' ? 'http://localhost:8080/api' : '/api';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alert');
            const btn = document.getElementById('registerBtn');
            
            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value
            };

            btn.textContent = 'Registering...';
            btn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const response = await fetch(`${API}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const responseText = await response.text();
                let data = null;
                try { data = responseText ? JSON.parse(responseText) : null; } 
                catch (err) { data = { error: responseText }; }
                
                if (response.ok) {
                    alertBox.className = 'auth-alert alert-success';
                    alertBox.textContent = '✓ Registration successful! Redirecting to login...';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    alertBox.className = 'auth-alert alert-error';
                    alertBox.textContent = data?.error || 'Registration failed.';
                    alertBox.style.display = 'block';
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            } catch (error) {
                alertBox.className = 'auth-alert alert-error';
                alertBox.textContent = 'Cannot reach backend. Make sure Spring Boot is running.';
                alertBox.style.display = 'block';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
