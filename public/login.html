<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — LibraryHub</title>
    <meta name="description" content="Sign in to your LibraryHub account to manage books, members, and transactions.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <!-- Visual Side -->
        <div class="auth-visual">
            <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200&h=1600&fit=crop" alt="Library">
            <div class="auth-overlay-text">
                <h2>Every book is a<br>new adventure</h2>
                <p>Manage your entire library with a modern, powerful system built for efficiency.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="brand">
                <div class="brand-icon">📖</div>
                <div class="brand-text">LibraryHub</div>
            </div>

            <h1>Welcome back</h1>
            <p class="auth-subtitle">Sign in to your account to continue</p>

            <div id="alert" class="auth-alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn" style="justify-content:center;">
                    Sign In
                </button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // Redirect if on Live Server port
        if (window.location.port === '5500') {
            window.location.replace('http://localhost:8080/login.html');
        }

        // If already logged in, redirect
        if (sessionStorage.getItem('authCredentials')) {
            const role = sessionStorage.getItem('userRole');
            window.location.href = '/index.html';
        }

        const API = window.location.port === '5500' ? 'http://localhost:8080/api' : '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alert');
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store credentials
                    sessionStorage.setItem('authCredentials', btoa(`${username}:${password}`));
                    sessionStorage.setItem('username', data.username);
                    sessionStorage.setItem('fullName', data.fullName || data.username);
                    sessionStorage.setItem('userRole', data.role);
                    sessionStorage.setItem('userId', data.userId);
                    sessionStorage.setItem('email', data.email || '');

                    alertBox.className = 'auth-alert alert-success';
                    alertBox.textContent = '✓ Login successful! Redirecting...';
                    alertBox.style.display = 'block';

                    setTimeout(() => { window.location.href = '/index.html'; }, 800);
                } else {
                    alertBox.className = 'auth-alert alert-error';
                    alertBox.textContent = data.error || 'Invalid credentials';
                    alertBox.style.display = 'block';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                alertBox.className = 'auth-alert alert-error';
                alertBox.textContent = 'Cannot reach server. Make sure Spring Boot is running on port 8080.';
                alertBox.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
