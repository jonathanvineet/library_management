# Production Profile - Supabase PostgreSQL Configuration

# Supabase REST API Configuration (optional - for direct API calls)
supabase.url=${SUPABASE_URL}
supabase.anon.key=${SUPABASE_ANON_KEY}

# Supabase PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:aws-0-ap-southeast-1.pooler.supabase.com}:${SUPABASE_DB_PORT:6543}/${SUPABASE_DB_NAME:postgres}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# Use 'validate' in production to prevent auto-schema changes
# Use 'update' during initial setup, then change to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# PostgreSQL specific settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Disable H2 console in production
spring.h2.console.enabled=false
