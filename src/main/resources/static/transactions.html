<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Library Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">📚 LibraryHub</div>
            <ul class="navbar-nav">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="books.html" class="nav-link">Books</a></li>
                <li><a href="members.html" class="nav-link" id="membersNav">Members</a></li>
                <li><a href="transactions.html" class="nav-link active">Transactions</a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                        <span id="themeIcon">🌙</span>
                    </button>
                </li>
                <li class="user-info">
                    <span id="userDisplay"></span>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="flex-between mb-2">
            <h1 style="font-size: 2.5rem; font-weight: 700;">Transaction Management</h1>
            <button class="btn btn-primary" onclick="openBorrowModal()" id="borrowBtn">📖 Borrow Book</button>
        </div>

        <div class="glass-card mb-2" id="requestsBox" style="display:none;">
            <div class="flex-between mb-2">
                <h2 style="font-size: 1.25rem; font-weight: 600;">Book Requests</h2>
                <button class="btn btn-outline" onclick="loadPendingRequests()">Refresh</button>
            </div>
            <div id="pendingRequestsBody" class="text-center">No pending requests</div>
        </div>

        <!-- Filter Buttons -->
        <div class="flex gap-1 mb-2">
            <button class="btn btn-outline" onclick="filterTransactions('all')">All Transactions</button>
            <button class="btn btn-success" onclick="filterTransactions('active')">Active Loans</button>
            <button class="btn btn-warning" onclick="filterTransactions('overdue')">Overdue</button>
            <button class="btn btn-secondary" onclick="filterTransactions('returned')">Returned</button>
        </div>

        <!-- Transactions Table -->
        <div class="glass-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Book</th>
                            <th>Borrow Date</th>
                            <th>Due Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Borrow Book Modal -->
    <div id="borrowModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Borrow Book</h2>
                <button class="close-modal" onclick="closeBorrowModal()">✕</button>
            </div>
            <form id="borrowForm">
                <div class="form-group">
                    <label for="memberId">Select Member</label>
                    <select id="memberId" required>
                        <option value="">Choose a member...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="bookId">Select Book</label>
                    <select id="bookId" required>
                        <option value="">Choose a book...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" required>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeBorrowModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Borrow Book</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allTransactions = [];
        let currentFilter = 'all';

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'light' ? '🌙' : '☀️';
        }

        function initTransactionsPage() {
            if (!checkAuth()) return;
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeIcon').textContent = savedTheme === 'light' ? '🌙' : '☀️';
            
            const role = getUserRole();
            const username = getUsername();
            const fullName = sessionStorage.getItem('fullName');
            
            document.getElementById('userDisplay').textContent = `${fullName || username} (${role})`;
            
            if (role !== 'LIBRARIAN') {
                document.getElementById('membersNav').style.display = 'none';
                document.getElementById('borrowBtn').style.display = 'none';
            } else {
                document.getElementById('requestsBox').style.display = 'block';
                loadPendingRequests();
            }
            
            loadTransactions();
        }

        async function loadTransactions() {
            try {
                allTransactions = await fetchAPI('/transactions');
                displayTransactions(allTransactions);
            } catch (error) {
                console.error('Error loading transactions:', error);
                showNotification('Failed to load transactions', 'error');
            }
        }

        function displayTransactions(transactions) {
            const tbody = document.getElementById('transactionsTableBody');
            const role = getUserRole();
            
            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No transactions found</td></tr>';
                return;
            }

            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td>${t.member.name}</td>
                    <td><strong>${t.book.title}</strong></td>
                    <td>${formatDate(t.borrowDate)}</td>
                    <td>${formatDate(t.dueDate)}</td>
                    <td>${t.returnDate ? formatDate(t.returnDate) : '-'}</td>
                    <td><span class="badge badge-${getStatusBadge(t.status)}">${t.status}</span></td>
                    <td>
                        ${role === 'LIBRARIAN' && t.status === 'BORROWED' ? `
                            <button class="btn btn-success" style="padding: 0.375rem 0.75rem; font-size: 0.875rem;" onclick="returnBook('${t.id}')">✅ Return</button>
                        ` : `
                            <span class="badge badge-info">View Only</span>
                        `}
                    </td>
                </tr>
            `).join('');
        }

        function filterTransactions(filter) {
            currentFilter = filter;
            let filtered = allTransactions;
            
            if (filter === 'active') {
                filtered = allTransactions.filter(t => t.status === 'BORROWED');
            } else if (filter === 'overdue') {
                filtered = allTransactions.filter(t => t.status === 'OVERDUE');
            } else if (filter === 'returned') {
                filtered = allTransactions.filter(t => t.status === 'RETURNED');
            }
            
            displayTransactions(filtered);
        }

        function getStatusBadge(status) {
            const badges = {
                'BORROWED': 'info',
                'RETURNED': 'success',
                'OVERDUE': 'danger',
                'LOST': 'danger'
            };
            return badges[status] || 'info';
        }

        async function openBorrowModal() {
            try {
                // Load members and available books
                const [members, books] = await Promise.all([
                    fetchAPI('/members/active'),
                    fetchAPI('/books')
                ]);
                
                const memberSelect = document.getElementById('memberId');
                const bookSelect = document.getElementById('bookId');
                
                memberSelect.innerHTML = '<option value="">Choose a member...</option>' +
                    members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
                
                const availableBooks = books.filter(b => b.availableCopies > 0);
                bookSelect.innerHTML = '<option value="">Choose a book...</option>' +
                    availableBooks.map(b => `<option value="${b.id}">${b.title} (${b.availableCopies} available)</option>`).join('');
                
                // Set default due date (14 days from now)
                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + 14);
                document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];
                
                document.getElementById('borrowModal').classList.add('active');
            } catch (error) {
                showNotification('Failed to load data', 'error');
            }
        }

        function closeBorrowModal() {
            document.getElementById('borrowModal').classList.remove('active');
        }

        async function returnBook(transactionId) {
            if (!confirm('Are you sure you want to mark this book as returned?')) return;
            
            try {
                await fetchAPI(`/transactions/return/${transactionId}`, { method: 'POST' });
                showNotification('Book returned successfully', 'success');
                loadTransactions();
            } catch (error) {
                showNotification(error.message || 'Failed to return book', 'error');
            }
        }

        document.getElementById('borrowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const memberId = parseInt(document.getElementById('memberId').value);
            const bookId = document.getElementById('bookId').value;
            const dueDateValue = document.getElementById('dueDate').value;

            // Calculate loan days based on selected due date.
            // Backend expects 'loanDays' field.
            const today = new Date();
            const dueDate = new Date(dueDateValue);
            const msPerDay = 1000 * 60 * 60 * 24;
            const loanDays = Math.max(1, Math.ceil((dueDate - today) / msPerDay));

            const transactionData = {
                memberId,
                bookId,
                loanDays
            };
            
            try {
                await fetchAPI('/transactions/borrow', {
                    method: 'POST',
                    body: JSON.stringify(transactionData)
                });
                showNotification('Book borrowed successfully', 'success');
                closeBorrowModal();
                loadTransactions();
            } catch (error) {
                showNotification(error.message || 'Failed to borrow book', 'error');
            }
        });

        async function loadPendingRequests() {
            try {
                const requests = await fetchAPI('/book-requests/pending');
                const body = document.getElementById('pendingRequestsBody');
                if (!requests.length) {
                    body.innerHTML = '<p class="text-center">No pending requests</p>';
                    return;
                }

                body.innerHTML = requests.map(r => `
                    <div style="display:flex; justify-content:space-between; gap:1rem; padding:0.75rem 0; border-bottom:1px solid var(--glass-border); align-items:center;">
                        <div>
                            <strong>${r.member.name}</strong> requested <strong>${r.book.title}</strong>
                            <div style="font-size:0.85rem; color:var(--text-secondary);">${formatDate(r.requestedAt)}</div>
                        </div>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn-success" style="padding:0.35rem 0.7rem;" onclick="approveRequest('${r.id}')">Approve</button>
                            <button class="btn btn-danger" style="padding:0.35rem 0.7rem;" onclick="rejectRequest('${r.id}')">Reject</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showNotification('Failed to load pending requests', 'error');
            }
        }

        async function approveRequest(requestId) {
            try {
                const result = await fetchAPI(`/book-requests/${requestId}/approve`, { method: 'POST' });
                if (result.status === 'REJECTED') {
                    showNotification(result.decisionMessage || 'Request rejected due to member limit', 'error');
                } else {
                    showNotification('Request approved and book issued', 'success');
                }
                loadPendingRequests();
                loadTransactions();
            } catch (error) {
                showNotification(error.message || 'Failed to approve request', 'error');
            }
        }

        async function rejectRequest(requestId) {
            const reason = prompt('Reason for rejection:', 'You already reached the book limit so you cannot get this book');
            try {
                await fetchAPI(`/book-requests/${requestId}/reject`, {
                    method: 'POST',
                    body: JSON.stringify({ reason: reason || 'Request rejected by librarian' })
                });
                showNotification('Request rejected', 'success');
                loadPendingRequests();
            } catch (error) {
                showNotification(error.message || 'Failed to reject request', 'error');
            }
        }

        initTransactionsPage();
    </script>
</body>
</html>
