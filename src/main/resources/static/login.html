<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Library Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Theme Toggle -->
            <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
            
            <div class="auth-header">
                <div class="auth-brand">📚</div>
                <h1>Welcome Back</h1>
                <p>Sign in to your Library Management account</p>
            </div>
            
            <div id="alert" class="alert" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                    Sign In
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-secondary); font-size: 0.938rem;">
                    Don't have an account? 
                    <a href="register.html" style="color: var(--primary-600); font-weight: 600; text-decoration: underline;">
                        Register here
                    </a>
                </p>
            </div>
            
            <div class="default-credentials">
                <h4>🔑 Test Credentials</h4>
                <div class="credentials-list">
                    <p><strong>Librarian Account:</strong></p>
                    <p>Username: librarian | Password: librarian123</p>
                    
                    <p style="margin-top: 0.75rem;"><strong>Member Account:</strong></p>
                    <p>Username: member | Password: member123</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            icon.textContent = theme === 'light' ? '🌙' : '☀️';
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        });

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');

            // Determine API base URL
            const apiBaseUrl = window.location.port === '5500'
                ? 'http://localhost:8080/api'
                : '/api';

            try {
                const credentials = btoa(username + ':' + password);

                const response = await fetch(`${apiBaseUrl}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + credentials
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    sessionStorage.setItem('authCredentials', credentials);
                    sessionStorage.setItem('userRole', data.role);
                    sessionStorage.setItem('username', data.username);
                    sessionStorage.setItem('fullName', data.fullName);
                    
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = '✅ Login successful! Redirecting...';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    alertBox.className = 'alert alert-error';
                    alertBox.textContent = '❌ ' + (data.error || 'Login failed. Please check your credentials.');
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = '❌ An error occurred. Please try again.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
