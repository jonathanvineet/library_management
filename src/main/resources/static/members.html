<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Library Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">📚 LibraryHub</div>
            <ul class="navbar-nav">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="books.html" class="nav-link">Books</a></li>
                <li><a href="members.html" class="nav-link active">Members</a></li>
                <li><a href="transactions.html" class="nav-link">Transactions</a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                        <span id="themeIcon">🌙</span>
                    </button>
                </li>
                <li class="user-info">
                    <span id="userDisplay"></span>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="flex-between mb-2">
            <h1 style="font-size: 2.5rem; font-weight: 700;">Member Management</h1>
            <button class="btn btn-primary" onclick="openAddMemberModal()">➕ Register New Member</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by name...">
            <button class="btn btn-secondary" onclick="searchMembers()">Search</button>
            <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
        </div>

        <!-- Members Table -->
        <div class="glass-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr>
                            <td colspan="6" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Member Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Register New Member</h2>
                <button class="close-modal" onclick="closeMemberModal()">✕</button>
            </div>
            <form id="memberForm">
                <input type="hidden" id="memberId">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone">
                </div>
                
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" rows="3"></textarea>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeMemberModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Member</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allMembers = [];

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'light' ? '🌙' : '☀️';
        }

        function initMembersPage() {
            if (!checkAuth()) return;
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeIcon').textContent = savedTheme === 'light' ? '🌙' : '☀️';
            
            const role = getUserRole();
            const username = getUsername();
            const fullName = sessionStorage.getItem('fullName');
            
            document.getElementById('userDisplay').textContent = `${fullName || username} (${role})`;
            
            if (role !== 'LIBRARIAN') {
                window.location.href = '/index.html';
                return;
            }
            
            loadMembers();
        }

        async function loadMembers() {
            try {
                allMembers = await fetchAPI('/api/members');
                displayMembers(allMembers);
            } catch (error) {
                console.error('Error loading members:', error);
                showNotification('Failed to load members', 'error');
            }
        }

        function displayMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            
            if (members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No members found</td></tr>';
                return;
            }

            tbody.innerHTML = members.map(member => `
                <tr>
                    <td><strong>${member.name}</strong></td>
                    <td>${member.email}</td>
                    <td>${member.phone || 'N/A'}</td>
                    <td>${member.address || 'N/A'}</td>
                    <td><span class="badge badge-${member.active ? 'success' : 'danger'}">${member.active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 0.375rem 0.75rem; font-size: 0.875rem;" onclick="editMember(${member.id})">✏️ Edit</button>
                        <button class="btn btn-${member.active ? 'warning' : 'success'}" style="padding: 0.375rem 0.75rem; font-size: 0.875rem;" onclick="toggleMemberStatus(${member.id}, ${member.active})">${member.active ? '🚫 Deactivate' : '✅ Activate'}</button>
                    </td>
                </tr>
            `).join('');
        }

        function searchMembers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(member => 
                member.name.toLowerCase().includes(query)
            );
            displayMembers(filtered);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayMembers(allMembers);
        }

        function openAddMemberModal() {
            document.getElementById('modalTitle').textContent = 'Register New Member';
            document.getElementById('memberForm').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('memberModal').classList.add('active');
        }

        function closeMemberModal() {
            document.getElementById('memberModal').classList.remove('active');
        }

        async function editMember(id) {
            try {
                const member = await fetchAPI(`/api/members/${id}`);
                document.getElementById('modalTitle').textContent = 'Edit Member';
                document.getElementById('memberId').value = member.id;
                document.getElementById('name').value = member.name;
                document.getElementById('email').value = member.email;
                document.getElementById('phone').value = member.phone || '';
                document.getElementById('address').value = member.address || '';
                document.getElementById('memberModal').classList.add('active');
            } catch (error) {
                showNotification('Failed to load member details', 'error');
            }
        }

        async function toggleMemberStatus(id, currentStatus) {
            const action = currentStatus ? 'deactivate' : 'activate';
            if (!confirm(`Are you sure you want to ${action} this member?`)) return;
            
            try {
                await fetchAPI(`/api/members/${id}/${action}`, { method: 'PUT' });
                showNotification(`Member ${action}d successfully`, 'success');
                loadMembers();
            } catch (error) {
                showNotification(error.message || `Failed to ${action} member`, 'error');
            }
        }

        document.getElementById('memberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('memberId').value;
            const memberData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                active: true
            };
            
            try {
                if (id) {
                    await fetchAPI(`/api/members/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(memberData)
                    });
                    showNotification('Member updated successfully', 'success');
                } else {
                    await fetchAPI('/api/members', {
                        method: 'POST',
                        body: JSON.stringify(memberData)
                    });
                    showNotification('Member registered successfully', 'success');
                }
                
                closeMemberModal();
                loadMembers();
            } catch (error) {
                showNotification(error.message || 'Failed to save member', 'error');
            }
        });

        initMembersPage();
    </script>
</body>
</html>
