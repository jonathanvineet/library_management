<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Library Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">📚 LibraryHub</div>
            <ul class="navbar-nav">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="books.html" class="nav-link active">Books</a></li>
                <li><a href="members.html" class="nav-link" id="membersNav">Members</a></li>
                <li><a href="transactions.html" class="nav-link">Transactions</a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                        <span id="themeIcon">🌙</span>
                    </button>
                </li>
                <li class="user-info">
                    <span id="userDisplay"></span>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="flex-between mb-2">
            <h1 style="font-size: 2.5rem; font-weight: 700;">Book Management</h1>
            <button class="btn btn-primary" onclick="openAddBookModal()" id="addBookBtn">➕ Add New Book</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by title, author, or ISBN...">
            <button class="btn btn-secondary" onclick="searchBooks()">Search</button>
            <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
        </div>

        <div id="memberRequestsCard" class="glass-card mb-2" style="display: none;">
            <div class="flex-between mb-2">
                <h2 style="font-size: 1.25rem; font-weight: 600;">My Book Requests</h2>
                <button class="btn btn-outline" onclick="loadMyRequests()">Refresh</button>
            </div>
            <div id="memberRequestsList" class="text-center" style="color: var(--text-secondary);">No requests yet</div>
        </div>

        <div id="memberBooksGrid" class="stats-grid" style="display: none;"></div>

        <!-- Books Table -->
        <div class="glass-card" id="booksTableCard">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ISBN</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Total Copies</th>
                            <th>Available</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Book Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Book</h2>
                <button class="close-modal" onclick="closeBookModal()">✕</button>
            </div>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                
                <div class="form-group">
                    <label for="isbn">ISBN</label>
                    <input type="text" id="isbn" required>
                </div>
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" required>
                </div>
                
                <div class="form-group">
                    <label for="publisher">Publisher</label>
                    <input type="text" id="publisher">
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category">
                </div>
                
                <div class="form-group">
                    <label for="totalCopies">Total Copies</label>
                    <input type="number" id="totalCopies" min="1" required>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeBookModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Book</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allBooks = [];
        let currentMemberId = null;
        let currentUserId = null;

        // Theme Management
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            icon.textContent = theme === 'light' ? '🌙' : '☀️';
        }

        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function initBooksPage() {
            if (!checkAuth()) return;
            
            loadSavedTheme();
            
            const role = getUserRole();
            const username = getUsername();
            const fullName = sessionStorage.getItem('fullName');
            
            document.getElementById('userDisplay').textContent = `${fullName || username} (${role})`;
            
            if (role !== 'LIBRARIAN') {
                document.getElementById('membersNav').style.display = 'none';
                document.getElementById('addBookBtn').style.display = 'none';
                document.getElementById('booksTableCard').style.display = 'none';
                document.getElementById('memberBooksGrid').style.display = 'grid';
                document.getElementById('memberRequestsCard').style.display = 'block';
                initMemberContext();
            }
            
            loadBooks();
        }

        async function initMemberContext() {
            try {
                currentUserId = sessionStorage.getItem('userId');
                const email = sessionStorage.getItem('email');
                if (!email) return;
                const member = await fetchAPI(`/members/email/${encodeURIComponent(email)}`);
                currentMemberId = member.id;
                await loadMyRequests();
            } catch (error) {
                showNotification('Unable to load member profile for requests', 'error');
            }
        }

        async function loadBooks() {
            try {
                allBooks = await fetchAPI('/books');
                displayBooks(allBooks);
            } catch (error) {
                console.error('Error loading books:', error);
                showNotification('Failed to load books', 'error');
            }
        }

        function displayBooks(books) {
            const role = getUserRole();

            if (role !== 'LIBRARIAN') {
                displayMemberBooks(books);
                return;
            }

            const tbody = document.getElementById('booksTableBody');
            
            if (books.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No books found</td></tr>';
                return;
            }

            tbody.innerHTML = books.map(book => `
                <tr>
                    <td>${book.isbn}</td>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td><span class="badge badge-info">${book.category || 'N/A'}</span></td>
                    <td>${book.totalCopies}</td>
                    <td><span class="badge badge-${book.availableCopies > 0 ? 'success' : 'danger'}">${book.availableCopies}</span></td>
                    <td>
                        ${role === 'LIBRARIAN' ? `
                            <button class="btn btn-secondary" style="padding: 0.375rem 0.75rem; font-size: 0.875rem;" onclick="editBook('${book.id}')">✏️ Edit</button>
                            <button class="btn btn-danger" style="padding: 0.375rem 0.75rem; font-size: 0.875rem;" onclick="deleteBook('${book.id}')">🗑️ Delete</button>
                        ` : `
                            <span class="badge badge-info">View Only</span>
                        `}
                    </td>
                </tr>
            `).join('');
        }

        function displayMemberBooks(books) {
            const grid = document.getElementById('memberBooksGrid');
            if (books.length === 0) {
                grid.innerHTML = '<div class="glass-card"><p class="text-center">No books found</p></div>';
                return;
            }

            grid.innerHTML = books.map(book => `
                <div class="glass-card" style="padding: 1rem;">
                    <div style="display: flex; gap: 1rem; align-items: flex-start;">
                        <img src="${book.coverImageUrl || 'https://placehold.co/90x130?text=Book'}" alt="${book.title}" style="width: 90px; height: 130px; object-fit: cover; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <div style="flex: 1;">
                            <h3 style="margin-bottom: 0.35rem;">${book.title}</h3>
                            <p style="margin-bottom: 0.35rem; color: var(--text-secondary);">${book.author}</p>
                            <p style="margin-bottom: 0.75rem;"><span class="badge badge-${book.availableCopies > 0 ? 'success' : 'danger'}">${book.availableCopies} available</span></p>
                            <button class="btn btn-primary" ${book.availableCopies > 0 ? '' : 'disabled'} onclick="requestBook('${book.id}')">
                                Request Checkout
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function requestBook(bookId) {
            if (!currentUserId && !currentMemberId) {
                showNotification('User profile not loaded yet', 'error');
                return;
            }

            try {
                const payload = { bookId };
                if (currentUserId) {
                    payload.userId = currentUserId;
                } else {
                    payload.memberId = currentMemberId;
                }

                await fetchAPI('/book-requests/request', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                showNotification('Book request sent to librarian', 'success');
                await loadMyRequests();
            } catch (error) {
                showNotification(error.message || 'Failed to send request', 'error');
            }
        }

        async function loadMyRequests() {
            const requestIdentity = currentUserId || currentMemberId;
            if (!requestIdentity) return;
            try {
                const requests = await fetchAPI(`/book-requests/member/${requestIdentity}`);
                const container = document.getElementById('memberRequestsList');
                if (!requests.length) {
                    container.innerHTML = '<p class="text-center">No requests yet</p>';
                    return;
                }

                container.innerHTML = requests.slice(0, 8).map(r => `
                    <div style="display:flex; justify-content:space-between; gap:1rem; padding:0.5rem 0; border-bottom:1px solid var(--glass-border);">
                        <div>
                            <strong>${r.book.title}</strong>
                            <div style="font-size:0.85rem; color:var(--text-secondary);">${formatDate(r.requestedAt)}</div>
                        </div>
                        <div>
                            <span class="badge badge-${r.status === 'APPROVED' ? 'success' : (r.status === 'REJECTED' ? 'danger' : 'warning')}">${r.status}</span>
                            ${r.decisionMessage ? `<div style="font-size:0.8rem; margin-top:0.25rem; color:var(--text-secondary);">${r.decisionMessage}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showNotification('Failed to load request status', 'error');
            }
        }

        function searchBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allBooks.filter(book => 
                book.title.toLowerCase().includes(query) ||
                book.author.toLowerCase().includes(query) ||
                book.isbn.toLowerCase().includes(query)
            );
            displayBooks(filtered);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayBooks(allBooks);
        }

        function openAddBookModal() {
            document.getElementById('modalTitle').textContent = 'Add New Book';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('bookModal').classList.add('active');
        }

        function closeBookModal() {
            document.getElementById('bookModal').classList.remove('active');
        }

        async function editBook(id) {
            try {
                const book = await fetchAPI(`/books/${id}`);
                document.getElementById('modalTitle').textContent = 'Edit Book';
                document.getElementById('bookId').value = book.id;
                document.getElementById('isbn').value = book.isbn;
                document.getElementById('title').value = book.title;
                document.getElementById('author').value = book.author;
                document.getElementById('publisher').value = book.publisher || '';
                document.getElementById('category').value = book.category || '';
                document.getElementById('totalCopies').value = book.totalCopies;
                document.getElementById('bookModal').classList.add('active');
            } catch (error) {
                showNotification('Failed to load book details', 'error');
            }
        }

        async function deleteBook(id) {
            if (!confirm('Are you sure you want to delete this book?')) return;
            
            try {
                await fetchAPI(`/books/${id}`, { method: 'DELETE' });
                showNotification('Book deleted successfully', 'success');
                loadBooks();
            } catch (error) {
                showNotification(error.message || 'Failed to delete book', 'error');
            }
        }

        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('bookId').value;
            const bookData = {
                isbn: document.getElementById('isbn').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                publisher: document.getElementById('publisher').value,
                category: document.getElementById('category').value,
                totalCopies: parseInt(document.getElementById('totalCopies').value),
                availableCopies: parseInt(document.getElementById('totalCopies').value)
            };
            
            try {
                if (id) {
                    await fetchAPI(`/books/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(bookData)
                    });
                    showNotification('Book updated successfully', 'success');
                } else {
                    await fetchAPI('/books', {
                        method: 'POST',
                        body: JSON.stringify(bookData)
                    });
                    showNotification('Book added successfully', 'success');
                }
                
                closeBookModal();
                loadBooks();
            } catch (error) {
                showNotification(error.message || 'Failed to save book', 'error');
            }
        });

        initBooksPage();
    </script>
</body>
</html>
