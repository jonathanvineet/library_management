<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Library Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Theme Toggle -->
            <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
            
            <div class="auth-header">
                <div class="auth-brand">📚</div>
                <h1>Create Account</h1>
                <p>Register for Library Management System</p>
            </div>
            
            <div id="alert" class="alert" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="MEMBER">Member</option>
                        <option value="LIBRARIAN">Librarian</option>
                    </select>
                    <p style="font-size: 0.813rem; color: var(--text-muted); margin-top: 0.25rem;">
                        Members can borrow books, Librarians can manage the system
                    </p>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                    Create Account
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-secondary); font-size: 0.938rem;">
                    Already have an account? 
                    <a href="login.html" style="color: var(--primary-600); font-weight: 600; text-decoration: underline;">
                        Sign in here
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Keep registration on Spring Boot origin so API calls are same-origin.
        if (window.location.port === '5500') {
            window.location.replace('http://localhost:8080/register.html');
        }

        // Defensive cleanup: remove stale service workers that can break fetch in local dev.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
                registrations.forEach((registration) => registration.unregister());
            }).catch(() => {
                // Ignore cleanup errors; registration should still work without this.
            });
        }

        // Theme Toggle Functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            icon.textContent = theme === 'light' ? '🌙' : '☀️';
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        });

        // Register Form Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value
            };

            const alertBox = document.getElementById('alert');

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const responseText = await response.text();
                let data = null;
                try {
                    data = responseText ? JSON.parse(responseText) : null;
                } catch (parseError) {
                    data = { error: responseText };
                }
                
                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = '✅ Registration successful! Redirecting to login...';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    alertBox.className = 'alert alert-error';
                    alertBox.textContent = '❌ ' + (data.error || 'Registration failed. Please try again.');
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = '❌ Cannot reach backend. Open http://localhost:8080/register.html and ensure Spring Boot is running.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
